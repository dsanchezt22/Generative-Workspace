# Python quality-gate config. This repo's source lives under backend/src and its
# tests under backend/tests (tests import as `src.*`), so the tools are pointed at
# backend/ from the repo root via pythonpath / mypy_path / testpaths.

[tool.ruff]
line-length = 100

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "S", "C4", "UP", "SIM", "RUF"]

[tool.ruff.lint.per-file-ignores]
# assert is fine in tests
"**/tests/**" = ["S101"]
# These two modules are LLM-prompt-heavy: the orchestrator's system prompts and the
# offline template catalogue carry long, intentional prose lines that must not be
# reflowed (it would corrupt the prompt text). Line-length is not meaningful there.
"**/services/orchestrator.py" = ["E501"]
"**/stub_templates.py" = ["E501"]

[tool.mypy]
strict = true
ignore_missing_imports = true
# Resolve `import src.*` (source lives in backend/) from the repo root.
mypy_path = "backend"
# Incremental adoption: report on the files actually checked, not their transitive
# dependencies (the repo has pre-existing untyped modules we don't retype here).
follow_imports = "silent"

[[tool.mypy.overrides]]
# stub_templates is a large, dynamic dict-factory (~95 builders that return plain
# ModuleConfig dicts). Enforcing strict per-call/def typing there adds noise without
# value; the dicts are validated downstream by the ModuleConfig Pydantic model.
module = "src.stub_templates"
disallow_untyped_defs = false
disallow_untyped_calls = false
disallow_incomplete_defs = false
disallow_any_generics = false
warn_return_any = false

# --cov-fail-under is a RATCHET set to the repo's current baseline (the 80% target
# predates this work and isn't met by the legacy modules). Raise it as coverage
# improves; never lower it. New code should land at/above the target.
[tool.pytest.ini_options]
addopts = "--cov=src --cov-report=term-missing --cov-fail-under=74"
testpaths = ["backend/tests"]
# Put backend/ on sys.path so `import src.*` resolves when run from the repo root.
pythonpath = ["backend"]
asyncio_mode = "auto"

[tool.coverage.run]
branch = true
source = ["src"]
